{% extends "core/base_app.html" %}

{% block title %}Excluir tarefa — Dungeons & Deadlines{% endblock %}

{% block content %}
<div class="max-w-5xl">
  <div class="glass-card" style="padding:1.5rem;max-width:28rem;">
    <h1 class="page-title" style="font-size:1.25rem;">Excluir tarefa?</h1>
    <p class="text-muted">Tem certeza que deseja excluir <strong>{{ object.title }}</strong>?</p>
    <form method="post" class="flex-wrap-gap" style="margin-top:1.5rem;">
      {% csrf_token %}
      <button type="submit" class="btn btn-destructive">Excluir</button>
      <a href="{% url 'tasks' %}" class="btn btn-secondary">Cancelar</a>
    </form>
  </div>
</div>
{% endblock %}
